kind = "web"
previewPath = "/"
title = "Manick Rajendran — Healthcare Transformation Leader"
version = "1.0.0"
id = "artifacts/manick-rajendran"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19604

[services.development]
run = "pnpm --filter @workspace/manick-rajendran run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/manick-rajendran", "run", "build" ]
publicDir = "artifacts/manick-rajendran/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19604"
BASE_PATH = "/"
